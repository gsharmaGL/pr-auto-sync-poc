name: PR Auto Sync

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  SYNC_RELEASE: ${{ github.event.pull_request.head.ref }}_to_release
  SYNC_DEVELOP: ${{ github.event.pull_request.head.ref }}_to_develop
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PR_TITLE: ${{ github.event.pull_request.title }}
  REPO: ${{ github.repository }}

jobs:
  # ── PR Opened: create sync branches and PRs to release + develop ──
  sync-on-open:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find latest release branch
        id: release
        run: |
          BRANCH=$(git branch -r --list 'origin/release/*' --sort=-version:refname | head -1 | xargs)
          if [ -z "$BRANCH" ]; then
            echo "::warning::No release/* branch found"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${BRANCH#origin/}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get PR commits
        id: commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits" --jq '.[].sha' | tr '\n' ' ')
          echo "shas=$COMMITS" >> "$GITHUB_OUTPUT"

      # ── Release sync ──
      - name: Create release sync branch and PR
        if: steps.release.outputs.found == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BRANCH: ${{ steps.release.outputs.branch }}
        run: |
          git checkout -b "$SYNC_RELEASE" "origin/$RELEASE_BRANCH"

          CONFLICT=false
          for SHA in ${{ steps.commits.outputs.shas }}; do
            if ! git cherry-pick "$SHA" --no-edit; then
              echo "::warning::Cherry-pick of $SHA onto $RELEASE_BRANCH failed"
              git cherry-pick --abort || true
              CONFLICT=true
            fi
          done

          git push origin "$SYNC_RELEASE"

          BODY="Auto-generated sync PR from #$PR_NUMBER"
          if [ "$CONFLICT" = true ]; then
            BODY="$BODY"$'\n\n'"⚠️ Some commits could not be cherry-picked. Manual resolution required."
          fi

          gh pr create \
            --repo "$REPO" \
            --base "$RELEASE_BRANCH" \
            --head "$SYNC_RELEASE" \
            --title "[Auto-Sync] $PR_TITLE → $RELEASE_BRANCH" \
            --body "$BODY"

      # ── Develop sync ──
      - name: Create develop sync branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git ls-remote --exit-code origin develop > /dev/null 2>&1; then
            echo "::error::develop branch not found"
            exit 1
          fi

          git checkout -b "$SYNC_DEVELOP" origin/develop

          CONFLICT=false
          for SHA in ${{ steps.commits.outputs.shas }}; do
            if ! git cherry-pick "$SHA" --no-edit; then
              echo "::warning::Cherry-pick of $SHA onto develop failed"
              git cherry-pick --abort || true
              CONFLICT=true
            fi
          done

          git push origin "$SYNC_DEVELOP"

          BODY="Auto-generated sync PR from #$PR_NUMBER"
          if [ "$CONFLICT" = true ]; then
            BODY="$BODY"$'\n\n'"⚠️ Some commits could not be cherry-picked. Manual resolution required."
          fi

          gh pr create \
            --repo "$REPO" \
            --base develop \
            --head "$SYNC_DEVELOP" \
            --title "[Auto-Sync] $PR_TITLE → develop" \
            --body "$BODY"

  # ── PR Updated: re-cherry-pick all commits onto sync branches ──
  sync-on-update:
    if: github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find latest release branch
        id: release
        run: |
          BRANCH=$(git branch -r --list 'origin/release/*' --sort=-version:refname | head -1 | xargs)
          if [ -z "$BRANCH" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${BRANCH#origin/}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get PR commits
        id: commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(gh api "repos/$REPO/pulls/$PR_NUMBER/commits" --jq '.[].sha' | tr '\n' ' ')
          echo "shas=$COMMITS" >> "$GITHUB_OUTPUT"

      - name: Update release sync branch
        if: steps.release.outputs.found == 'true'
        continue-on-error: true
        env:
          RELEASE_BRANCH: ${{ steps.release.outputs.branch }}
        run: |
          if ! git ls-remote --exit-code origin "$SYNC_RELEASE" > /dev/null 2>&1; then
            echo "::notice::Sync branch $SYNC_RELEASE does not exist, skipping"
            exit 0
          fi

          git checkout -B "$SYNC_RELEASE" "origin/$RELEASE_BRANCH"

          for SHA in ${{ steps.commits.outputs.shas }}; do
            if ! git cherry-pick "$SHA" --no-edit; then
              echo "::warning::Cherry-pick of $SHA onto release failed"
              git cherry-pick --abort || true
            fi
          done

          git push origin "$SYNC_RELEASE" --force

      - name: Update develop sync branch
        run: |
          if ! git ls-remote --exit-code origin "$SYNC_DEVELOP" > /dev/null 2>&1; then
            echo "::notice::Sync branch $SYNC_DEVELOP does not exist, skipping"
            exit 0
          fi

          git checkout -B "$SYNC_DEVELOP" origin/develop

          for SHA in ${{ steps.commits.outputs.shas }}; do
            if ! git cherry-pick "$SHA" --no-edit; then
              echo "::warning::Cherry-pick of $SHA onto develop failed"
              git cherry-pick --abort || true
            fi
          done

          git push origin "$SYNC_DEVELOP" --force

  # ── PR Merged: auto-merge sync PRs if no conflicts ──
  auto-merge:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Merge sync PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for BRANCH in "$SYNC_RELEASE" "$SYNC_DEVELOP"; do
            PR=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json number --jq '.[0].number')
            if [ -n "$PR" ] && [ "$PR" != "null" ]; then
              echo "Merging PR #$PR ($BRANCH)"
              if ! gh pr merge "$PR" --repo "$REPO" --merge; then
                echo "::warning::Auto-merge failed for PR #$PR"
                gh pr comment "$PR" --repo "$REPO" \
                  --body "⚠️ Auto-merge failed. Please resolve conflicts and merge manually."
              fi
            else
              echo "No open sync PR found for $BRANCH"
            fi
          done

  # ── PR Closed (not merged): clean up sync PRs and branches ──
  cleanup:
    if: github.event.action == 'closed' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Close sync PRs and delete branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for BRANCH in "$SYNC_RELEASE" "$SYNC_DEVELOP"; do
            PR=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json number --jq '.[0].number')
            if [ -n "$PR" ] && [ "$PR" != "null" ]; then
              echo "Closing PR #$PR and deleting branch $BRANCH"
              gh pr close "$PR" --repo "$REPO" --delete-branch \
                --comment "Closing: source PR #$PR_NUMBER was closed without merging."
            else
              echo "No open sync PR for $BRANCH, attempting branch cleanup"
              gh api "repos/$REPO/git/refs/heads/$BRANCH" -X DELETE 2>/dev/null || true
            fi
          done
name: PR Auto Sync (Production)

on:
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Authenticate GH
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Set Variables
        id: vars
        run: |
          echo "PR_BRANCH=${{ github.head_ref }}" >> $GITHUB_ENV
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Get PR Commits
        id: commits
        run: |
          gh pr view $PR_NUMBER --json commits -q '.commits[].oid' > commits.txt

      # =========================
      # 🔥 PR OPENED
      # =========================
      - name: Handle PR Open
        if: github.event.action == 'opened'
        run: |
          apply_commit() {
            COMMIT="$1"

            if [ "$(git rev-list --parents -n 1 "$COMMIT" | wc -w)" -gt 2 ]; then
              git cherry-pick -m 1 "$COMMIT"
            else
              git cherry-pick "$COMMIT"
            fi
          }

          ensure_pr_label() {
            TARGET="$1"
            PR_ID=$(gh pr list --head "$AUTO_BRANCH" --base "$TARGET" --json number -q '.[0].number')

            if [ -n "$PR_ID" ]; then
              gh pr edit "$PR_ID" --add-label "auto-generated" || true
            fi
          }

          for TARGET in stg develop
          do
            AUTO_BRANCH="auto/${PR_BRANCH}_to_${TARGET}"

            # Check if branch exists
            if git ls-remote --exit-code --heads origin $AUTO_BRANCH; then
              echo "Branch exists, skipping creation"
              continue
            fi

            git fetch origin
            git checkout origin/$TARGET -b $AUTO_BRANCH

            # Cherry-pick commits
            while read COMMIT; do
              if ! apply_commit "$COMMIT"; then
                echo "Conflict in $COMMIT"
                git cherry-pick --abort || true
              fi
            done < commits.txt

            git push origin $AUTO_BRANCH

            # Create PR only if not exists
            EXISTING_PR=$(gh pr list --head $AUTO_BRANCH --json number -q '.[0].number')

            if [ -z "$EXISTING_PR" ]; then
              gh pr create \
                --base $TARGET \
                --head $AUTO_BRANCH \
                --title "Auto: $PR_BRANCH → $TARGET" \
                --body "Auto-generated PR"
            fi

            ensure_pr_label "$TARGET"
          done

      # =========================
      # 🔄 PR UPDATED
      # =========================
      - name: Handle PR Update
        if: github.event.action == 'synchronize'
        run: |
          apply_commit() {
            COMMIT="$1"

            if [ "$(git rev-list --parents -n 1 "$COMMIT" | wc -w)" -gt 2 ]; then
              git cherry-pick -m 1 "$COMMIT"
            else
              git cherry-pick "$COMMIT"
            fi
          }

          ensure_pr_label() {
            TARGET="$1"
            PR_ID=$(gh pr list --head "$AUTO_BRANCH" --base "$TARGET" --json number -q '.[0].number')

            if [ -n "$PR_ID" ]; then
              gh pr edit "$PR_ID" --add-label "auto-generated" || true
            fi
          }

          for TARGET in stg develop
          do
            AUTO_BRANCH="auto/${PR_BRANCH}_to_${TARGET}"

            git fetch origin $TARGET

            if git ls-remote --exit-code --heads origin $AUTO_BRANCH; then
              git fetch origin $AUTO_BRANCH
              git checkout -B $AUTO_BRANCH origin/$AUTO_BRANCH
            else
              echo "Remote branch $AUTO_BRANCH does not exist, creating it from $TARGET"
              git checkout -B $AUTO_BRANCH origin/$TARGET
            fi

            git reset --hard origin/$TARGET

            CONFLICT=false

            while read COMMIT; do
              if ! apply_commit "$COMMIT"; then
                CONFLICT=true
                git cherry-pick --abort || true
                break
              fi
            done < commits.txt

            if [ "$CONFLICT" = true ]; then
              gh pr comment $PR_NUMBER --body "⚠️ Conflict while syncing to $TARGET. Manual fix required."
              gh pr edit $PR_NUMBER --add-label "conflict" || true
              exit 0
            fi

            git push --force origin $AUTO_BRANCH

            EXISTING_PR=$(gh pr list --head $AUTO_BRANCH --base $TARGET --json number -q '.[0].number')

            if [ -z "$EXISTING_PR" ]; then
              gh pr create \
                --base $TARGET \
                --head $AUTO_BRANCH \
                --title "Auto: $PR_BRANCH → $TARGET" \
                --body "Auto-generated PR"
            fi

            ensure_pr_label "$TARGET"
          done

      # =========================
      # ✅ PR MERGED
      # =========================
      - name: Handle PR Merge
        if: github.event.pull_request.merged == true
        run: |
          for TARGET in stg develop
          do
            AUTO_BRANCH="auto/${PR_BRANCH}_to_${TARGET}"

            PR_ID=$(gh pr list --head $AUTO_BRANCH --json number -q '.[0].number')

            if [ ! -z "$PR_ID" ]; then
              gh pr merge $PR_ID --merge --auto || echo "Merge skipped"
            fi
          done

      # =========================
      # ❌ PR CLOSED (NOT MERGED)
      # =========================
      - name: Handle PR Close
        if: github.event.action == 'closed' && github.event.pull_request.merged == false
        run: |
          for TARGET in stg develop
          do
            AUTO_BRANCH="auto/${PR_BRANCH}_to_${TARGET}"

            PR_ID=$(gh pr list --head $AUTO_BRANCH --json number -q '.[0].number')

            if [ ! -z "$PR_ID" ]; then
              gh pr close $PR_ID
            fi

            git push origin --delete $AUTO_BRANCH || true
          done