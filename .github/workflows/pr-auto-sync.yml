name: PR Auto Sync (Production)

on:
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Authenticate GH
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Set Variables
        id: vars
        run: |
          echo "PR_BRANCH=${{ github.head_ref }}" >> $GITHUB_ENV
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Get PR Commits
        id: commits
        run: |
          gh pr view $PR_NUMBER --json commits -q '.commits[].oid' > commits.txt

      # =========================
      # 🔥 PR OPENED
      # =========================
      - name: Handle PR Open
        if: github.event.action == 'opened'
        run: |
          for TARGET in stg develop
          do
            AUTO_BRANCH="auto/${PR_BRANCH}_to_${TARGET}"

            # Check if branch exists
            if git ls-remote --exit-code --heads origin $AUTO_BRANCH; then
              echo "Branch exists, skipping creation"
              continue
            fi

            git fetch origin
            git checkout origin/$TARGET -b $AUTO_BRANCH

            # Cherry-pick commits
            while read COMMIT; do
              git cherry-pick $COMMIT || echo "Conflict in $COMMIT"
            done < commits.txt

            git push origin $AUTO_BRANCH

            # Create PR only if not exists
            EXISTING_PR=$(gh pr list --head $AUTO_BRANCH --json number -q '.[0].number')

            if [ -z "$EXISTING_PR" ]; then
              gh pr create \
                --base $TARGET \
                --head $AUTO_BRANCH \
                --title "Auto: $PR_BRANCH → $TARGET" \
                --body "Auto-generated PR" \
                --label "auto-generated"
            fi
          done

      # =========================
      # 🔄 PR UPDATED
      # =========================
      - name: Handle PR Update
        if: github.event.action == 'synchronize'
        run: |
          for TARGET in stg develop
          do
            AUTO_BRANCH="auto/${PR_BRANCH}_to_${TARGET}"

            git fetch origin $TARGET $AUTO_BRANCH

            if ! git show-ref --verify --quiet "refs/remotes/origin/$AUTO_BRANCH"; then
              echo "Remote branch origin/$AUTO_BRANCH does not exist, skipping"
              continue
            fi

            git checkout -B $AUTO_BRANCH origin/$AUTO_BRANCH

            git reset --hard origin/$TARGET

            CONFLICT=false

            while read COMMIT; do
              git cherry-pick $COMMIT || CONFLICT=true
            done < commits.txt

            if [ "$CONFLICT" = true ]; then
              gh pr comment $PR_NUMBER --body "⚠️ Conflict while syncing to $TARGET. Manual fix required."
              gh pr edit $PR_NUMBER --add-label "conflict"
              exit 0
            fi

            git push --force origin $AUTO_BRANCH
          done

      # =========================
      # ✅ PR MERGED
      # =========================
      - name: Handle PR Merge
        if: github.event.pull_request.merged == true
        run: |
          for TARGET in stg develop
          do
            AUTO_BRANCH="auto/${PR_BRANCH}_to_${TARGET}"

            PR_ID=$(gh pr list --head $AUTO_BRANCH --json number -q '.[0].number')

            if [ ! -z "$PR_ID" ]; then
              gh pr merge $PR_ID --merge --auto || echo "Merge skipped"
            fi
          done

      # =========================
      # ❌ PR CLOSED (NOT MERGED)
      # =========================
      - name: Handle PR Close
        if: github.event.action == 'closed' && github.event.pull_request.merged == false
        run: |
          for TARGET in stg develop
          do
            AUTO_BRANCH="auto/${PR_BRANCH}_to_${TARGET}"

            PR_ID=$(gh pr list --head $AUTO_BRANCH --json number -q '.[0].number')

            if [ ! -z "$PR_ID" ]; then
              gh pr close $PR_ID
            fi

            git push origin --delete $AUTO_BRANCH || true
          done